<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hospital Microservices | Landing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-noise"></div>

  <section class="landing">
    <div class="landing-content">
      <div class="badge">Hospital Microservices</div>
      <h1>Unified Operations Console</h1>
      <p>Manage patients, appointments, and medical records from a single, fast UI built for microservices.</p>
      <div class="landing-actions">
        <a class="btn-link" href="dashboard.html">Enter Dashboard</a>
        <button id="landingPing" class="ghost">Check Gateway</button>
        <span id="landingStatus" class="status">Unknown</span>
      </div>
    </div>
    <div class="landing-card">
      <div class="metric">
        <span class="label">Services</span>
        <span class="value">6</span>
      </div>
      <div class="metric">
        <span class="label">Gateway</span>
        <span class="value">8080</span>
      </div>
      <div class="metric">
        <span class="label">UI</span>
        <span class="value">8090</span>
      </div>
    </div>
  </section>

  <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>

  <script src="landing.js"></script>
</body>
</html>
