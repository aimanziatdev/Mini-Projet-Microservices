server:
  port: 8082

spring:
  application:
    name: appointment-service
  config:
    import: optional:configserver:http://localhost:8888

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: logs/appointment-service.log
