server:
  port: 8080

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: patient-service
          uri: lb://patient-service
          predicates:
            - Path=/patients/**
        - id: appointment-service
          uri: lb://appointment-service
          predicates:
            - Path=/appointments/**
        - id: medical-record-service
          uri: lb://medical-record-service
          predicates:
            - Path=/records/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
